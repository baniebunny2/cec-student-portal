<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEC Portal - Login</title>
    
    <!-- Google Fonts: Poppins (Clean UI) & Cinzel (Royal Gold Headers to match CEC style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cec-gold: #ffcc00;
            --cec-gold-grad: linear-gradient(135deg, #fff2a3 0%, #ffd700 50%, #cca600 100%);
            --cec-blue-dark: #041124;
            --cec-blue-accent: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--cec-blue-dark);
            overflow: hidden;
            position: relative;
        }

        /* --- FADED / DIMMED CUSTOM BACKGROUND --- */
        .custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('CECbg.JPEG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Fades/Dims the image so the login card stays highly readable */
            filter: brightness(0.35) contrast(1.1) blur(2px);
            transform: scale(1.02); /* Prevents blur edges */
            z-index: 1;
        }

        /* --- GEOMETRIC WIREFRAME OVERLAY --- */
        .geo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 86, 179, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(26, 42, 108, 0.6) 0%, transparent 50%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- LOGIN CARD --- */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(4, 17, 36, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1.5px solid rgba(255, 215, 0, 0.35); /* Subtle Gold Border */
            border-radius: 20px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8),
                        0 0 30px rgba(0, 86, 179, 0.3);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- HEADER SECTION --- */
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .cec-logo {
            width: 95px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 50%;
            /* Gives your JPEG logo a clean glowing pop */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            border: 2px solid #ffd700;
            background: #fff;
        }

        .chinese-text {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            color: var(--cec-blue-accent);
            font-size: 15px;
            letter-spacing: 3px;
            margin-bottom: 2px;
            opacity: 0.9;
        }

        .brand-header h1 {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .brand-header .subtitle {
            font-family: 'Cinzel', serif;
            background: var(--cec-gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* --- FORM INPUTS (FLOATING LABELS) --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            outline: none;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #8fa0bc;
            font-size: 14px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Focus & Active States */
        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            border-color: #ffd700;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -10px;
            left: 14px;
            font-size: 11px;
            background: #041124;
            padding: 2px 8px;
            border-radius: 4px;
            color: #ffd700;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .eye-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8fa0bc;
            font-size: 18px;
            user-select: none;
            transition: color 0.2s;
        }

        .eye-toggle:hover { color: #ffd700; }

        /* --- OPTIONS ROW --- */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: #ffd700;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--cec-blue-accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: #ffd700; text-decoration: underline; }

        /* --- SUBMIT BUTTON (METALLIC GOLD) --- */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--cec-gold-grad);
            border: none;
            border-radius: 10px;
            color: #041124;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 25px rgba(204, 166, 0, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.5);
        }

        .btn-submit:active { transform: translateY(0); }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(4, 17, 36, 0.2);
            border-radius: 50%;
            border-top-color: #041124;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: #8fa0bc;
            letter-spacing: 0.5px;
        }

        /* Notification Toast */
        #toast {
            position: absolute;
            top: 25px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-30px);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- Faded CEC Background & Theme Gradients -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('CECbg.jpg'); background-size: cover; background-position: center; filter: brightness(0.35); z-index: 1;"></div>
    <div class="geo-overlay"></div>

    <div id="toast">Authentication Successful! Redirecting...</div>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="brand-header">
                <!-- User's provided Logo -->
                <img src="CEC.jpg" alt="CEC Logo" class="cec-logo" onerror="this.style.display='none'">
                
                <div class="chinese-text">宿務東方學院</div>
                <h1>CEBU EASTERN COLLEGE</h1>
                <div class="subtitle">PORTAL LOG IN</div>
            </div>

            <form id="portalForm" onsubmit="handleLogin(event)">
                
                <div class="input-group">
                    <input type="text" id="idNumber" placeholder=" " required autocomplete="off">
                    <label for="idNumber">ID Number</label>
                </div>

                <div class="input-group">
                    <input type="password" id="passwordField" placeholder=" " required>
                    <label for="passwordField">Password</label>
                    <span class="eye-toggle" onclick="togglePassword()" title="Show/Hide">👁️</span>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember ID
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">
                    <span id="btnText">LOG IN</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>

            </form>

            <div class="footer-note">
                &copy; 2026 CEBU EASTERN COLLEGE &bull; ALL RIGHTS RESERVED
            </div>

        </div>
    </div>

    <script>
        function togglePassword() {
            const passInput = document.getElementById('passwordField');
            const eyeIcon = document.querySelector('.eye-toggle');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.style.opacity = '0.4';
            } else {
                passInput.type = 'password';
                eyeIcon.style.opacity = '1';
            }
        }

        function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const idVal = document.getElementById('idNumber').value;
            const toast = document.getElementById('toast');

            btn.style.pointerEvents = 'none';
            text.style.display = 'none';
            spinner.style.display = 'block';

            setTimeout(() => {
                spinner.style.display = 'none';
                text.style.display = 'block';
                btn.style.pointerEvents = 'auto';

                toast.innerHTML = `Welcome back, ID #${idVal}`;
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';

                document.getElementById('portalForm').reset();

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-30px)';
                }, 4000);

            }, 1500);
        }
    </script>
</body>
</html>
